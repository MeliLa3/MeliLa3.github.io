<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Arte de MeliLa3</title>
    <style>
        @import url('https://googleapis.com');
        /* Estilos generales del lienzo */
        body {
            background-color: #ffe3ec;
            color: #4a2834;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Fredoka One', sans-serif;
            margin-bottom: 40px;
        }
        /* Cuadrícula interactiva */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Bloque de cada obra */
        .obra-artistica {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background-color: #fff;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        /* Efecto interactivo al pasar el ratón (Hover) */
        .obra-artistica:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }
        .obra-artistica img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .obra-artistica:hover img {
            transform: scale(1.08); /* Zoom interactivo de la imagen */
        }
        /* Texto descriptivo oculto que aparece al interactuar */
        .info-obra {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: left;
        }
        .obra-artistica:hover .info-obra {
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>MeliLa3</h1>

    <div class="galeria">
        <!-- Espacio para la Obra 1 -->
        <div class="obra-artistica">
            <img src="EMILIA.png" alt="Mi primera obra">
            <div class="info-obra">
                <h3>Emilia</h3>
                <p>Ilustración Digital / 2026</p>
            </div>
        </div>

        <!-- Espacio para la Obra 2 -->
        <div class="obra-artistica">
            <img src="TINI .png" alt="Mi segunda obra">
            <div class="info-obra">
                <h3>Tini Stoessel </h3>
                <p>Ilustración Digital / 2026</p>
            </div>
        </div>

        <!-- Espacio para la Obra 3 -->
        <div class="obra-artistica">
            <img src="MELI THERIAN FURRY.png" alt="Mi tercera obra">
            <div class="info-obra">
                <h3>Meli y los Therians </h3>
                <p>Ilustración Digital / 2026</p>
            </div>
        </div>
    </div>

</body>
</html>
